<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bountiful Analytics</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F7F2EE; font-family: 'Noto Sans', sans-serif; }
  input, select, button { font-family: 'Noto Sans', sans-serif; outline: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const p = { sage:"#505D55", mid:"#A1AFA6", light:"#EBEFED", charcoal:"#4D4D4D", cream:"#F7F2EE", accent:"#592239" };
const btn = (x={}) => ({ background:p.sage, color:"#fff", border:"none", borderRadius:8, padding:"10px 22px", fontSize:14, cursor:"pointer", fontWeight:500, ...x });
const inp = { width:"100%", padding:"10px 12px", border:`1px solid ${p.mid}`, borderRadius:8, fontSize:14, background:p.cream, color:p.charcoal, marginBottom:12, display:"block" };

const UKEY="bountiful_users", LKEY="bountiful_log";
const DEF=[{username:"admin",password:"bountiful2024",role:"admin",name:"Kasmira"}];
function getUsers(){try{const d=localStorage.getItem(UKEY);return d?JSON.parse(d):DEF;}catch{return DEF;}}
function saveUsers(u){try{localStorage.setItem(UKEY,JSON.stringify(u));}catch{}}
function getLog(){try{const d=localStorage.getItem(LKEY);return d?JSON.parse(d):[];}catch{return[];}}
function addLog(username,name){try{const log=getLog();log.unshift({username,name,time:new Date().toISOString()});localStorage.setItem(LKEY,JSON.stringify(log.slice(0,200)));}catch{}}

const DEMO={
  "7":{
    ga:{sessions:2840,users:1950,pageviews:7210,bounceRate:40.1,avgDuration:"2m 08s",convRate:4.1,weekly:[380,420,390,460,480,420,290],goals:[{name:"Newsletter signup",completions:98,rate:"5.0%"},{name:"Pack download",completions:67,rate:"3.4%"},{name:"Partner click",completions:41,rate:"2.1%"}]},
    fb:{dau:3100,mau:18920,retention7:48.2,retention30:31.7,avgSessions:3.2,crashFree:99.4,weekly:[2900,3100,3050,3300,3241,3180,3420],events:[{name:"article_view",count:5810},{name:"tracker_open",count:2940},{name:"pack_download",count:1241},{name:"notification_tap",count:980}]}
  },
  "30":{
    ga:{sessions:12843,users:9214,pageviews:38201,bounceRate:42.3,avgDuration:"2m 14s",convRate:3.8,weekly:[1820,1940,2100,1780,2240,2310,2050,1990,2160,2410,2260,1940],goals:[{name:"Newsletter signup",completions:486,rate:"5.3%"},{name:"Pack download",completions:312,rate:"3.4%"},{name:"Partner click",completions:198,rate:"2.1%"}]},
    fb:{dau:3241,mau:18920,retention7:48.2,retention30:31.7,avgSessions:3.4,crashFree:99.2,weekly:[2900,3100,3050,3300,3241,3180,3420,3310,3500,3241,3600,3240],events:[{name:"article_view",count:28410},{name:"tracker_open",count:14820},{name:"pack_download",count:6341},{name:"notification_tap",count:4912}]}
  },
  "90":{
    ga:{sessions:38200,users:27400,pageviews:112000,bounceRate:43.8,avgDuration:"2m 05s",convRate:3.5,weekly:[2800,3100,2900,3400,3600,3200,2900,3100,3800,4100,3700,3200],goals:[{name:"Newsletter signup",completions:1420,rate:"5.2%"},{name:"Pack download",completions:910,rate:"3.3%"},{name:"Partner click",completions:580,rate:"2.1%"}]},
    fb:{dau:3100,mau:19400,retention7:46.8,retention30:30.2,avgSessions:3.1,crashFree:99.1,weekly:[2700,2900,3100,3300,3200,3400,3600,3500,3700,3400,3200,3100],events:[{name:"article_view",count:84100},{name:"tracker_open",count:43200},{name:"pack_download",count:18900},{name:"notification_tap",count:14300}]}
  },
  "365":{
    ga:{sessions:148000,users:98000,pageviews:420000,bounceRate:44.2,avgDuration:"1m 58s",convRate:3.2,weekly:[10200,11400,12800,13100,11900,12400,13800,14200,12900,13400,14800,15200],goals:[{name:"Newsletter signup",completions:5200,rate:"5.3%"},{name:"Pack download",completions:3400,rate:"3.5%"},{name:"Partner click",completions:2100,rate:"2.1%"}]},
    fb:{dau:3400,mau:21000,retention7:45.1,retention30:29.8,avgSessions:3.0,crashFree:98.9,weekly:[2400,2700,2900,3100,3300,3200,3400,3600,3500,3700,3800,3400],events:[{name:"article_view",count:312000},{name:"tracker_open",count:168000},{name:"pack_download",count:72000},{name:"notification_tap",count:54000}]}
  }
};
const SOURCES={
  ga:[{name:"Organic search",pct:38},{name:"Direct",pct:22},{name:"Social",pct:18},{name:"Email",pct:14},{name:"Referral",pct:8}],
  fb:[{name:"Organic",pct:44},{name:"Referral",pct:29},{name:"Paid",pct:17},{name:"Unknown",pct:10}]
};
const PERIODS=[{label:"7 days",value:"7"},{label:"30 days",value:"30"},{label:"90 days",value:"90"},{label:"12 months",value:"365"}];

function Card({label,value,sub}){return(<div style={{background:p.light,borderRadius:10,padding:"14px 16px"}}><div style={{fontSize:12,color:p.sage,marginBottom:4}}>{label}</div><div style={{fontSize:22,fontWeight:500,color:p.charcoal,fontFamily:"'Merriweather',serif"}}>{value}</div>{sub&&<div style={{fontSize:12,color:p.mid,marginTop:2}}>{sub}</div>}</div>);}
function Bar({label,pct,color}){return(<div style={{marginBottom:8}}><div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:p.charcoal,marginBottom:3}}><span>{label}</span><span style={{color:p.sage}}>{pct}%</span></div><div style={{background:p.light,borderRadius:4,height:7}}><div style={{width:`${pct}%`,background:color||p.sage,borderRadius:4,height:7}}/></div></div>);}
function Spark({data,color}){const max=Math.max(...data),min=Math.min(...data);const pts=data.map((v,i)=>`${(i/(data.length-1))*320},${60-((v-min)/(max-min||1))*52-4}`).join(" ");return <svg viewBox="0 0 320 60" style={{width:"100%",height:60}}><polyline points={pts} fill="none" stroke={color||p.sage} strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/></svg>;}

function PeriodSelector({period,setPeriod}){return(<div style={{display:"flex",gap:6,marginBottom:20}}>{PERIODS.map(q=>(<button key={q.value} onClick={()=>setPeriod(q.value)} style={{padding:"6px 14px",borderRadius:20,fontSize:13,cursor:"pointer",fontWeight:period===q.value?500:400,background:period===q.value?p.sage:"#fff",color:period===q.value?"#fff":p.mid,border:`1px solid ${period===q.value?p.sage:p.light}`}}>{q.label}</button>))}</div>);}

function GATab({period}){const d=DEMO[period].ga;return(<div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}><Card label="Sessions" value={d.sessions.toLocaleString()}/><Card label="Users" value={d.users.toLocaleString()}/><Card label="Pageviews" value={d.pageviews.toLocaleString()}/><Card label="Bounce rate" value={`${d.bounceRate}%`}/><Card label="Avg. session" value={d.avgDuration}/><Card label="Conv. rate" value={`${d.convRate}%`}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:12}}>Traffic sources</div>{SOURCES.ga.map(s=><Bar key={s.name} label={s.name} pct={s.pct}/>)}</div><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:8}}>Sessions trend</div><Spark data={d.weekly}/><div style={{marginTop:12}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:8}}>Goal completions</div>{d.goals.map(g=>(<div key={g.name} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:`1px solid ${p.light}`}}><span style={{color:p.charcoal}}>{g.name}</span><span style={{color:p.sage}}>{g.completions.toLocaleString()} <span style={{color:p.mid}}>({g.rate})</span></span></div>))}</div></div></div><p style={{fontSize:12,color:p.mid,marginTop:14}}>Showing demo data. Add your GA4 Property ID in Settings to pull live data.</p></div>);}

function FirebaseTab({period}){const d=DEMO[period].fb;return(<div><div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:20}}><Card label="Daily active users" value={d.dau.toLocaleString()}/><Card label="Monthly active users" value={d.mau.toLocaleString()}/><Card label="7-day retention" value={`${d.retention7}%`}/><Card label="30-day retention" value={`${d.retention30}%`}/><Card label="Avg. sessions/user" value={d.avgSessions}/><Card label="Crash-free users" value={`${d.crashFree}%`}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:12}}>User acquisition</div>{SOURCES.fb.map(s=><Bar key={s.name} label={s.name} pct={s.pct} color={p.accent}/>)}</div><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:8}}>DAU trend</div><Spark data={d.weekly} color={p.accent}/><div style={{marginTop:12}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:8}}>Top events</div>{d.events.map(e=>(<div key={e.name} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"5px 0",borderBottom:`1px solid ${p.light}`}}><span style={{color:p.charcoal,fontFamily:"monospace"}}>{e.name}</span><span style={{color:p.accent}}>{e.count.toLocaleString()}</span></div>))}</div></div></div><p style={{fontSize:12,color:p.mid,marginTop:14}}>Showing demo data. Add your Firebase Project ID in Settings to pull live data.</p></div>);}

function CombinedTab({period}){const ga=DEMO[period].ga,fb=DEMO[period].fb;const acq=[{name:"Organic (web)",pct:31},{name:"Organic (app)",pct:28},{name:"Social",pct:15},{name:"Email",pct:13},{name:"Referral",pct:8},{name:"Paid",pct:5}];const stickiness=Math.round((fb.dau/fb.mau)*100);return(<div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}><Card label="Web sessions" value={ga.sessions.toLocaleString()} sub="Google Analytics"/><Card label="App DAU" value={fb.dau.toLocaleString()} sub="Firebase"/><Card label="Web conv. rate" value={`${ga.convRate}%`} sub="Goal completions"/><Card label="App stickiness" value={`${stickiness}%`} sub="DAU/MAU"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:12}}>Combined acquisition</div>{acq.map(s=><Bar key={s.name} label={s.name} pct={s.pct} color={s.name.includes("app")?p.accent:p.sage}/>)}<div style={{display:"flex",gap:16,marginTop:10,fontSize:12}}><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:p.sage,display:"inline-block"}}/> Web</span><span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:p.accent,display:"inline-block"}}/> App</span></div></div><div style={{background:"#fff",border:`1px solid ${p.light}`,borderRadius:10,padding:"16px 18px"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.sage,marginBottom:10}}>Engagement comparison</div>{[{label:"Web bounce rate",val:`${ga.bounceRate}%`,note:"lower is better"},{label:"App 7d retention",val:`${fb.retention7}%`,note:"higher is better"},{label:"App 30d retention",val:`${fb.retention30}%`,note:"higher is better"},{label:"Web conv. rate",val:`${ga.convRate}%`,note:"goal completions"},{label:"Crash-free users",val:`${fb.crashFree}%`,note:"app stability"}].map(r=>(<div key={r.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:`1px solid ${p.light}`,fontSize:13}}><div><div style={{color:p.charcoal}}>{r.label}</div><div style={{fontSize:11,color:p.mid}}>{r.note}</div></div><span style={{fontWeight:500,color:p.sage}}>{r.val}</span></div>))}</div></div><p style={{fontSize:12,color:p.mid,marginTop:14}}>Showing combined demo data.</p></div>);}

function ChangePassword({currentUser}){const[cur,setCur]=useState("");const[np,setNp]=useState("");const[confirm,setConfirm]=useState("");const[msg,setMsg]=useState("");const[ok,setOk]=useState(false);const save=()=>{const users=getUsers();const me=users.find(u=>u.username===currentUser.username);if(!me||me.password!==cur){setMsg("Current password is incorrect.");setOk(false);return;}if(np.length<6){setMsg("New password must be at least 6 characters.");setOk(false);return;}if(np!==confirm){setMsg("New passwords don't match.");setOk(false);return;}saveUsers(users.map(u=>u.username===currentUser.username?{...u,password:np}:u));setMsg("Password updated successfully.");setOk(true);setCur("");setNp("");setConfirm("");};return(<div><input style={inp} placeholder="Current password" type="password" value={cur} onChange={e=>setCur(e.target.value)}/><input style={inp} placeholder="New password" type="password" value={np} onChange={e=>setNp(e.target.value)}/><input style={inp} placeholder="Confirm new password" type="password" value={confirm} onChange={e=>setConfirm(e.target.value)}/>{msg&&<div style={{fontSize:12,color:ok?p.sage:"#a32d2d",marginBottom:8}}>{msg}</div>}<button onClick={save} style={btn()}>Update password</button></div>);}

function AdminPanel({currentUser,onClose}){const[users,setUsers]=useState(getUsers());const[log]=useState(getLog());const[nu,setNu]=useState({username:"",password:"",name:"",role:"member"});const[msg,setMsg]=useState("");const add=()=>{if(!nu.username||!nu.password||!nu.name){setMsg("Fill in all fields.");return;}if(users.find(u=>u.username===nu.username)){setMsg("Username taken.");return;}const updated=[...users,nu];saveUsers(updated);setUsers(updated);setNu({username:"",password:"",name:"",role:"member"});setMsg("User added.");};const remove=(username)=>{if(username==="admin"){setMsg("Cannot remove admin.");return;}const updated=users.filter(u=>u.username!==username);saveUsers(updated);setUsers(updated);setMsg("Removed.");};return(<div style={{position:"fixed",inset:0,background:"rgba(80,93,85,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}><div style={{background:"#fff",borderRadius:14,padding:28,width:540,maxHeight:"85vh",overflowY:"auto"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h2 style={{fontFamily:"'Merriweather',serif",fontWeight:300,color:p.sage,fontSize:18,margin:0}}>Admin panel</h2><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:p.mid}}>✕</button></div><div style={{marginBottom:20}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.charcoal,marginBottom:10}}>Change my password</div><ChangePassword currentUser={currentUser}/></div><div style={{marginBottom:20}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.charcoal,marginBottom:10}}>Team members</div>{users.map(u=>(<div key={u.username} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${p.light}`,fontSize:13}}><div><span style={{fontWeight:500,color:p.charcoal}}>{u.name}</span><span style={{color:p.mid,marginLeft:8}}>@{u.username}</span>{u.role==="admin"&&<span style={{marginLeft:8,background:p.light,color:p.sage,fontSize:11,padding:"2px 8px",borderRadius:6}}>admin</span>}</div>{u.username!=="admin"&&<button onClick={()=>remove(u.username)} style={{background:"none",border:"1px solid #ddd",borderRadius:6,padding:"3px 10px",cursor:"pointer",fontSize:12,color:"#999"}}>Remove</button>}</div>))}</div><div style={{marginBottom:20}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.charcoal,marginBottom:10}}>Add team member</div><input style={inp} placeholder="Full name" value={nu.name} onChange={e=>setNu({...nu,name:e.target.value})}/><input style={inp} placeholder="Username" value={nu.username} onChange={e=>setNu({...nu,username:e.target.value})}/><input style={inp} placeholder="Password" type="password" value={nu.password} onChange={e=>setNu({...nu,password:e.target.value})}/><select style={{...inp,marginBottom:10}} value={nu.role} onChange={e=>setNu({...nu,role:e.target.value})}><option value="member">Member</option><option value="admin">Admin</option></select>{msg&&<div style={{fontSize:12,color:p.sage,marginBottom:8}}>{msg}</div>}<button onClick={add} style={btn()}>Add user</button></div><div><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:14,color:p.charcoal,marginBottom:10}}>Login history</div>{log.length===0&&<p style={{color:p.mid,fontSize:13}}>No logins recorded yet.</p>}{log.slice(0,30).map((l,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"5px 0",borderBottom:`1px solid ${p.light}`}}><span style={{color:p.charcoal}}>{l.name} <span style={{color:p.mid}}>@{l.username}</span></span><span style={{color:p.mid}}>{new Date(l.time).toLocaleString("en-NZ")}</span></div>))}</div></div></div>);}

function SettingsPanel({onClose}){const[ga4,setGa4]=useState("");const[fb,setFb]=useState("");const[saved,setSaved]=useState(false);return(<div style={{position:"fixed",inset:0,background:"rgba(80,93,85,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}><div style={{background:"#fff",borderRadius:14,padding:28,width:460}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><h2 style={{fontFamily:"'Merriweather',serif",fontWeight:300,color:p.sage,fontSize:18,margin:0}}>API settings</h2><button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:p.mid}}>✕</button></div><p style={{fontSize:13,color:p.mid,marginBottom:16}}>Credentials are stored locally in your browser only.</p><label style={{fontSize:13,color:p.charcoal}}>GA4 Property ID</label><input style={{...inp,marginTop:4}} placeholder="e.g. 123456789" value={ga4} onChange={e=>setGa4(e.target.value)}/><label style={{fontSize:13,color:p.charcoal}}>Firebase Project ID</label><input style={{...inp,marginTop:4}} placeholder="e.g. bountiful-app" value={fb} onChange={e=>setFb(e.target.value)}/><p style={{fontSize:12,color:p.mid,marginBottom:14}}>A Google Cloud service account with GA4 Viewer and Firebase Viewer roles is required.</p><button onClick={()=>setSaved(true)} style={btn()}>{saved?"Saved ✓":"Save settings"}</button></div></div>);}

function App(){const[authed,setAuthed]=useState(false);const[currentUser,setCurrentUser]=useState(null);const[lu,setLu]=useState("");const[lp,setLp]=useState("");const[err,setErr]=useState("");const[tab,setTab]=useState("ga");const[period,setPeriod]=useState("30");const[showAdmin,setShowAdmin]=useState(false);const[showSettings,setShowSettings]=useState(false);const login=()=>{const found=getUsers().find(u=>u.username===lu&&u.password===lp);if(found){addLog(found.username,found.name);setCurrentUser(found);setAuthed(true);setErr("");}else setErr("Incorrect username or password.");};if(!authed)return(<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:p.cream}}><div style={{background:"#fff",borderRadius:16,padding:"36px 40px",width:340,border:`1px solid ${p.light}`}}><div style={{textAlign:"center",marginBottom:24}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:22,color:p.sage}}>Bountiful</div><div style={{fontSize:13,color:p.mid,marginTop:4}}>Analytics dashboard</div></div><input style={inp} placeholder="Username" value={lu} onChange={e=>setLu(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/><input style={inp} placeholder="Password" type="password" value={lp} onChange={e=>setLp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>{err&&<div style={{color:"#a32d2d",fontSize:13,marginBottom:8}}>{err}</div>}<button onClick={login} style={btn({width:"100%"})}>Sign in</button></div></div>);return(<div style={{fontFamily:"'Noto Sans',sans-serif",background:p.cream,minHeight:"100vh"}}>{showAdmin&&<AdminPanel currentUser={currentUser} onClose={()=>setShowAdmin(false)}/>}{showSettings&&<SettingsPanel onClose={()=>setShowSettings(false)}/>}<div style={{background:p.sage,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontFamily:"'Merriweather',serif",fontWeight:300,fontSize:18,color:"#fff"}}>Bountiful analytics</div><div style={{display:"flex",gap:10,alignItems:"center"}}><button onClick={()=>setShowSettings(true)} style={{background:"none",border:"1px solid rgba(255,255,255,0.4)",borderRadius:7,color:"#fff",padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Settings</button>{currentUser?.role==="admin"&&<button onClick={()=>setShowAdmin(true)} style={{background:"none",border:"1px solid rgba(255,255,255,0.4)",borderRadius:7,color:"#fff",padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Admin</button>}<span style={{fontSize:13,color:"rgba(255,255,255,0.7)"}}>Hi, {currentUser?.name}</span><button onClick={()=>{setAuthed(false);setCurrentUser(null);setLu("");setLp("");}} style={{background:"none",border:"1px solid rgba(255,255,255,0.4)",borderRadius:7,color:"#fff",padding:"5px 12px",fontSize:12,cursor:"pointer"}}>Sign out</button></div></div><div style={{padding:"20px 24px 0"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:`2px solid ${p.light}`,marginBottom:20}}><div style={{display:"flex"}}>{[["ga","Google Analytics"],["firebase","Firebase"],["combined","Combined view"]].map(([id,label])=>(<button key={id} onClick={()=>setTab(id)} style={{background:"none",border:"none",borderBottom:tab===id?`2px solid ${p.sage}`:"2px solid transparent",marginBottom:-2,padding:"8px 18px",fontSize:14,color:tab===id?p.sage:p.mid,cursor:"pointer",fontWeight:tab===id?500:400}}>{label}</button>))}</div></div><PeriodSelector period={period} setPeriod={setPeriod}/>{tab==="ga"&&<GATab period={period}/>}{tab==="firebase"&&<FirebaseTab period={period}/>}{tab==="combined"&&<CombinedTab period={period}/>}</div></div>);}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
